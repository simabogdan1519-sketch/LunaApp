name: Build Luna APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Create fresh Flutter project
        run: flutter create --org com.luna --project-name luna /tmp/luna_fresh

      - name: Fix Android SDK versions
        run: |
          sed -i 's/minSdk = .*/minSdk = 24/' /tmp/luna_fresh/android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' /tmp/luna_fresh/android/app/build.gradle
          sed -i 's/targetSdk = .*/targetSdk = 34/' /tmp/luna_fresh/android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' /tmp/luna_fresh/android/app/build.gradle

      - name: Copy source code
        run: |
          cp -r lib/. /tmp/luna_fresh/lib/
          cp pubspec.yaml /tmp/luna_fresh/pubspec.yaml

      - name: Copy app icons
        run: |
          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            if [ -d "icons/$density" ]; then
              cp icons/$density/ic_launcher.png /tmp/luna_fresh/android/app/src/main/res/$density/ic_launcher.png
              cp icons/$density/ic_launcher_round.png /tmp/luna_fresh/android/app/src/main/res/$density/ic_launcher_round.png
              echo "✓ $density"
            fi
          done

      - name: Get dependencies
        working-directory: /tmp/luna_fresh
        run: flutter pub get

      - name: Build APK
        working-directory: /tmp/luna_fresh
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luna-apk
          path: /tmp/luna_fresh/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
